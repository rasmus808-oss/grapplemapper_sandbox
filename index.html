<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GrappleMapper</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='7' fill='%231C1C1C'/><g transform='translate(-8.225,-5.079) scale(0.1573)' fill='none' stroke='%23fff'><path d='M 115 65 L 175 65 L 175 95 L 130 95 L 130 125 L 200 125 L 200 155 L 115 155 L 115 185 L 85 185 L 85 125 L 65 125 L 65 95 L 115 95 Z' stroke-width='14' stroke-linejoin='round'/><path d='M 140 81 L 165 81' stroke-width='7'/><path d='M 130 105 L 155 105 L 155 130 L 180 130 L 180 105 L 205 105' stroke-width='7'/><path d='M 100 180 L 125 155' stroke-width='7'/><path d='M 215 150 L 215 125' stroke-width='7'/></g><g transform='translate(-8.225,-5.079) scale(0.1573)' fill='%23fff'><rect x='122' y='72' width='18' height='18' rx='2'/><polygon points='165,77 175,81 165,85'/><polygon points='205,101 215,105 205,109'/><rect x='92' y='162' width='18' height='18' rx='2'/><polygon points='120,152 125,155 125,160'/><rect x='205' y='132' width='18' height='18' rx='2'/><polygon points='211,125 215,115 219,125'/><rect x='225' y='165' width='18' height='18' rx='2'/></g></svg>">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="GrappleMapper">
<meta name="theme-color" content="#343230">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<link rel="apple-touch-icon" sizes="192x192" href="icons/icon-192.png">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0eeea;--surf:#fff;--bord:#e0ddd7;--bord2:#c8c5be;
  --text:#18170f;--mut:#8a8780;--acc:#6b46c1;--al:#ede9f8;
  --dan:#dc2626;
  --dark:#52504d;--dark2:#5e5c59;--dbord:#686460;--dbord2:#787470;--dtext:#f0ede6;--dmut:#b8b5b0;
  --sh:0 2px 8px rgba(0,0,0,.1),0 0 0 1px rgba(0,0,0,.05);
  --sh2:0 8px 28px rgba(0,0,0,.16),0 0 0 1px rgba(0,0,0,.07);
}
html,body{height:100%;overflow:hidden;font-family:'Inter',sans-serif;font-size:13px;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
#bar{position:fixed;top:0;left:0;right:0;height:50px;display:flex;align-items:center;gap:9px;padding:0 16px;background:var(--dark);border-bottom:1px solid var(--dbord);z-index:500}
.logo{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:15px;display:flex;align-items:center;gap:8px;color:#fff;width:264px;flex-shrink:0;box-sizing:border-box}
.logo-mark{width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,#6b46c1,#8b5cf6);display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px}
.logo span{color:#c4b5f8}
.sep{width:1px;height:22px;background:var(--bord);flex-shrink:0}
#ftitle{border:none;background:transparent;font-size:13px;font-weight:500;outline:none;width:180px;padding:3px 6px;border-radius:6px;color:#e8e6df}
#ftitle:hover,#ftitle:focus{background:rgba(255,255,255,.08)}
#ftitle::placeholder{color:#6a6865}
.btn{background:transparent;border:1px solid #3a3835;color:#e8e6df;padding:5px 12px;border-radius:20px;cursor:pointer;font-size:12px;font-family:inherit;font-weight:500;transition:all .15s;white-space:nowrap}
.btn:hover{background:rgba(255,255,255,.08);border-color:#4a4845}
.btn.pri{background:var(--acc);color:#fff;border-color:var(--acc)}
.btn.pri:hover{background:#5a37a8}
.sep{width:1px;height:22px;background:#3a3835;flex-shrink:0}
.sp{flex:1}
.zr{display:flex;align-items:center;gap:5px;font-size:12px;color:#9a9895}
.zr button{width:26px;height:26px;border-radius:6px;border:1px solid #3a3835;background:transparent;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;color:#e8e6df;transition:all .15s}
.zr button:hover{background:rgba(255,255,255,.08)}
#zpct{min-width:38px;text-align:center;font-weight:500;color:#e8e6df}
.icon-btn{width:32px;height:32px;border-radius:8px;border:1px solid #3a3835;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;color:#e8e6df;flex-shrink:0}
.icon-btn:hover{background:rgba(255,255,255,.1);border-color:#4a4845}
.icon-btn svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
#layout{position:fixed;top:50px;left:0;right:0;bottom:0;display:flex}
#sb{width:264px;flex-shrink:0;background:var(--dark);border-right:1px solid var(--dbord);display:flex;flex-direction:column;overflow:hidden}
#sb-scroll{flex:1;overflow-y:auto;padding:14px 15px}
#sb-scroll::-webkit-scrollbar{width:3px}
#sb-scroll::-webkit-scrollbar-thumb{background:var(--dbord2);border-radius:3px}
.ss{margin-bottom:20px}
.sl{font-size:10px;font-weight:700;color:#7a7875;text-transform:uppercase;letter-spacing:.09em;margin-bottom:9px}
.chips{display:flex;flex-wrap:wrap;gap:5px}
.chip{padding:5px 11px;border-radius:20px;cursor:pointer;font-size:12px;font-family:inherit;font-weight:500;border:1.5px solid var(--dbord);background:transparent;color:var(--dmut);transition:all .15s}
.chip:hover{border-color:var(--acc);color:#c4b5f8;background:rgba(107,70,193,.12)}
.add-big{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:11px;border-radius:10px;background:rgba(255,255,255,.07);border:1.5px dashed rgba(255,255,255,.22);color:var(--dmut);cursor:pointer;font-size:13px;font-weight:600;font-family:inherit;transition:all .15s}
.add-big:hover{background:rgba(255,255,255,.13);border-color:rgba(255,255,255,.35);color:var(--dtext)}
.howto{font-size:11px;color:var(--dmut);line-height:1.9}
.howto li{list-style:none;padding-left:14px;position:relative}
.howto li::before{content:'·';position:absolute;left:0;color:var(--acc)}
#detail{border-top:1px solid var(--dbord);padding:14px 15px;display:none}
#detail.on{display:block}
.dph{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.dpt{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:13px;color:#c4b5f8}
.field{margin-bottom:9px}
.field label{font-size:10px;font-weight:700;color:var(--dmut);text-transform:uppercase;letter-spacing:.08em;display:block;margin-bottom:3px}
.field input,.field textarea,.field select{width:100%;padding:7px 10px;border:1px solid var(--dbord);border-radius:8px;font-family:inherit;font-size:12px;color:var(--dtext);background:var(--dark2);outline:none;transition:border-color .15s}
.field input:focus,.field textarea:focus{border-color:var(--acc)}
.field textarea{resize:vertical;min-height:52px}
.field select option{background:var(--dark2);color:var(--dtext)}
#vpreview{width:100%;aspect-ratio:16/9;border-radius:8px;background:#111 center/cover;margin-bottom:10px;display:none;cursor:pointer}
#name-suggestions{margin-top:6px;display:flex;flex-wrap:wrap;gap:5px}
.nchip{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:500;background:rgba(107,70,193,.2);color:#c4b5f8;border:1px solid rgba(107,70,193,.4);cursor:pointer;transition:all .15s}
.nchip:hover{background:var(--acc);color:#fff}
.nchip.loading{background:var(--dark2);color:var(--dmut);border-color:var(--dbord);cursor:default;animation:pulse .9s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}
#wrap{flex:1;position:relative;overflow:hidden;background:#e2e0dc}
#dotbg{position:absolute;inset:0;pointer-events:none;background-image:radial-gradient(circle,#b0ada6 1.2px,transparent 1.2px);background-size:24px 24px;opacity:.55}
#canvas{position:absolute;top:0;left:0;transform-origin:0 0}
.node{position:absolute;width:190px;background:var(--surf);border:1.5px solid var(--bord);border-radius:12px;box-shadow:var(--sh);cursor:pointer;user-select:none;transition:border-color .15s,box-shadow .15s,width .25s ease,border-radius .25s ease}
.node:hover{border-color:var(--bord2);box-shadow:var(--sh2)}
.node.armed{border-color:var(--acc)!important;box-shadow:0 0 0 3px var(--al),var(--sh2)!important;cursor:crosshair}
.node.tgt{border-color:#06b6d4!important;box-shadow:0 0 0 3px rgba(6,182,212,.2)!important}
.node.sel{border-color:var(--acc);box-shadow:0 0 0 3px var(--al),var(--sh2)}
.node.msel{border-color:#8b5cf6;box-shadow:0 0 0 3px rgba(139,92,246,.18),var(--sh2)}
/* Position nodes are pill-shaped but same width */
.node.pos-node{border-radius:60px;text-align:center}
.node.pos-node .ninner{border-radius:58px}
.node.pos-node .nbody{padding:18px 16px}
.node.pos-node .ntag{display:none}
.node.pos-node .ntitle{font-size:12px;font-weight:700}
.node.pos-node .ndesc{display:none}
.ninner{border-radius:11px;overflow:hidden}
.nbar{height:4px}
.nph{width:100%;aspect-ratio:16/9;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;background:#f5f3f0}
.nph svg{width:32px;height:32px;stroke:#b8b5b0;fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round}
.nph-label{font-size:10px;font-weight:600;color:#c4c2be;letter-spacing:.06em;text-transform:uppercase}
.nvthumb{width:calc(100% - 12px);aspect-ratio:16/9;background:center/cover #111;position:relative;cursor:pointer;margin:6px;border-radius:8px;overflow:hidden}
.nvthumb::after{content:'';position:absolute;inset:0;background:rgba(0,0,0,.2)}
.nvplay{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.9);display:flex;align-items:center;justify-content:center;z-index:2;box-shadow:0 2px 8px rgba(0,0,0,.3);pointer-events:none}
.nvplay svg{width:12px;height:12px;fill:var(--acc);margin-left:2px}
.nvframe{width:calc(100% - 12px);aspect-ratio:16/9;position:relative;background:#000;margin:6px;border-radius:8px;overflow:hidden}
.nvframe iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:none;display:block}
/* Transparent scroll-shield — sits above iframe, passes clicks through to buttons only */
.nvframe .scroll-shield{position:absolute;inset:0;z-index:5;cursor:default}
.nvframe .nvstop{position:absolute;top:4px;right:4px;width:22px;height:22px;border-radius:50%;background:rgba(0,0,0,.6);color:#fff;font-size:12px;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:10;line-height:1}
.nvframe .nvstop:hover{background:rgba(0,0,0,.9)}
.nvframe .nvmute{position:absolute;top:4px;right:30px;width:22px;height:22px;border-radius:50%;background:rgba(0,0,0,.6);color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:10;transition:background .15s}
.nvframe .nvmute:hover{background:rgba(0,0,0,.9)}
.nvframe .nvmute svg{width:11px;height:11px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.nvframe .nvopen{position:absolute;bottom:4px;right:4px;width:22px;height:22px;border-radius:50%;background:rgba(0,0,0,.6);color:#fff;font-size:13px;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:10;line-height:1;text-decoration:none}
.nvframe .nvopen:hover{background:var(--acc)}
/* Portrait video (reels) */
.nvthumb.portrait,.nvframe.portrait{aspect-ratio:9/16}
/* IG direct iframe — clip off the top account bar */
.ig-clip{width:calc(100% - 12px);margin:6px;border-radius:8px;overflow:hidden;position:relative;background:#000;aspect-ratio:9/16}
.ig-clip iframe{width:100%;border:none;display:block;margin-top:-56px;height:calc(100% + 56px)}
.nbody{padding:8px 10px 10px}
.ntag{display:inline-block;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:600;letter-spacing:.03em;margin-bottom:5px}
.ntitle{font-size:12px;font-weight:600;line-height:1.35;margin-bottom:3px}
.ndesc{font-size:11px;color:var(--mut);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.delbtn{position:absolute;top:-8px;left:-8px;width:18px;height:18px;border-radius:50%;background:#fff;border:1px solid var(--bord);color:var(--mut);cursor:pointer;font-size:11px;display:none;align-items:center;justify-content:center;z-index:10;line-height:1}
.node:hover .delbtn,.node.sel .delbtn,.node.msel .delbtn{display:flex}
.delbtn:hover{background:var(--dan);border-color:var(--dan);color:#fff}
#marquee{position:absolute;border:1.5px dashed var(--acc);background:rgba(107,70,193,.06);border-radius:3px;display:none;pointer-events:none;z-index:200}
#group-marquee{position:absolute;border:2px dashed #06b6d4;background:rgba(6,182,212,.06);border-radius:6px;display:none;pointer-events:none;z-index:199}
#note-marquee{position:absolute;border:2px dashed #999;background:rgba(0,0,0,.04);border-radius:4px;display:none;pointer-events:none;z-index:199}
.note-el{position:absolute;background:#fff;border:1px solid #d8d5d0;border-radius:6px;box-shadow:1px 2px 6px rgba(0,0,0,.08);cursor:default;user-select:none;min-width:140px;min-height:80px;overflow:hidden;display:flex;flex-direction:column;}
.note-el .note-drag-bar{height:18px;background:#f0eeea;border-bottom:1px solid #e0ddd7;border-radius:5px 5px 0 0;cursor:move;display:flex;align-items:center;padding:0 6px;gap:4px;flex-shrink:0}
.note-el .note-drag-bar svg{opacity:.35;flex-shrink:0}
.note-el .note-body{padding:6px 8px;font-size:11px;line-height:1.55;color:#333;white-space:pre-wrap;word-break:break-word;cursor:default;overflow:hidden;position:relative;flex:1;}
.note-el .note-body.overflowing::after{content:'…';position:absolute;bottom:4px;right:6px;background:#fff;color:#999;font-size:11px;padding-left:4px;}
#group-label-editor input{border:none;border-radius:10px;padding:0 10px;font-size:11px;font-weight:700;font-family:'Space Grotesk','Inter',sans-serif;background:transparent;color:#fff;outline:none;box-shadow:none;caret-color:rgba(255,255,255,.8);text-align:left;height:20px;line-height:20px;}
.group-btn-active{background:rgba(6,182,212,.18)!important;border-color:#06b6d4!important;color:#06b6d4!important}
.note-btn-active{background:rgba(100,100,100,.14)!important;border-color:#888!important;color:#aaa!important}
#badge{position:absolute;top:12px;left:50%;transform:translateX(-50%);background:var(--acc);color:#fff;padding:5px 6px 5px 16px;border-radius:20px;font-size:12px;font-weight:600;display:none;white-space:nowrap;box-shadow:var(--sh2);display:none;align-items:center;gap:8px;cursor:default}
#badge-del{background:rgba(255,255,255,.25);border:none;color:#fff;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit}
#badge-del:hover{background:rgba(255,255,255,.4)}
#cstatus{position:absolute;top:12px;left:50%;transform:translateX(-50%);background:var(--acc);color:#fff;padding:6px 18px;border-radius:20px;font-size:12px;font-weight:600;display:none;pointer-events:none;white-space:nowrap;box-shadow:var(--sh2)}
#hint{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);background:rgba(255,255,255,.95);border:1px solid var(--bord);padding:7px 18px;border-radius:22px;font-size:11px;color:var(--mut);pointer-events:none;white-space:nowrap;box-shadow:var(--sh);transition:opacity .4s}
#arrow-label-editor{position:absolute;display:none;z-index:600}
#arrow-label-editor input{border:none;border-radius:4px;padding:3px 6px;font-size:11px;font-style:italic;font-family:'Inter',sans-serif;background:#e2e0dc;color:#444;outline:none;width:120px;text-align:center;box-shadow:none;caret-color:#666}
.ag.sel-arrow .ap{stroke:#666;stroke-width:3}
#toast{position:absolute;bottom:52px;left:50%;transform:translateX(-50%);background:#1a1917;color:#fff;padding:8px 20px;border-radius:22px;font-size:12px;font-weight:500;pointer-events:none;white-space:nowrap;box-shadow:var(--sh2);opacity:0;transition:opacity .25s;z-index:600}
#ac-drop{position:absolute;left:0;right:0;top:100%;background:var(--dark2);border:1.5px solid var(--acc);border-radius:9px;box-shadow:var(--sh2);z-index:700;display:none;overflow:hidden;margin-top:2px;max-height:220px;overflow-y:auto}
#ac-drop::-webkit-scrollbar{width:3px}
#ac-drop::-webkit-scrollbar-thumb{background:var(--dbord2);border-radius:3px}
.ac-item{padding:7px 11px;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:8px}
.ac-item:hover,.ac-item.ac-active{background:rgba(107,70,193,.25)}
.ac-item .ac-name{font-weight:500;color:var(--dtext)}
.ac-item .ac-tag{font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;flex-shrink:0}

/* drag handle — desktop hidden */
#drag-handle{display:none}

/* ── MOBILE ── */
@media(max-width:680px){
  .logo-text{display:none}
  #ftitle{flex:1;min-width:0;max-width:150px;font-size:12px}
  #zpct{min-width:28px}
  #layout{flex-direction:column}
  /* canvas: full screen minus topbar and handle strip */
  #wrap{position:fixed;top:50px;left:0;right:0;bottom:40px;touch-action:none}
  /* sidebar: fixed bottom, starts at 40px (handle only), grows up */
  #sb{position:fixed;bottom:0;left:0;right:0;width:100%!important;
      height:40px;border-right:none;overflow:hidden;z-index:400;
      display:flex;flex-direction:column;
      transition:height .3s cubic-bezier(.4,0,.2,1)}
  #sb.sb-open{height:65vh}
  /* handle lives inside sb — rides up as sb grows */
  #drag-handle{display:flex;align-items:center;justify-content:center;
      height:40px;flex-shrink:0;order:-1;
      background:var(--dark2);border-top:1px solid var(--dbord);
      cursor:grab;touch-action:none;user-select:none}
  #drag-pill{width:40px;height:4px;border-radius:2px;background:var(--dbord2)}
  #sb-scroll{flex:1;overflow-y:auto;padding:10px 12px;min-height:0}
  #detail{position:fixed;bottom:40px;left:0;right:0;background:var(--dark);
      border-top:1px solid var(--dbord);border-radius:14px 14px 0 0;
      max-height:70vh;overflow-y:auto;z-index:450;
      transform:translateY(100%);
      transition:transform .28s cubic-bezier(.4,0,.2,1);display:block}
  #detail.on{transform:translateY(0)}
  .icon-btn{width:36px;height:36px}
  .node{touch-action:none}
}
@media(max-width:440px){
  .logo span{display:none}
  .zr{display:none}
}
</style>
</head>
<body>
<div id="bar">
  <!-- Mobile sidebar toggle (hidden on desktop via CSS) -->
  <div class="logo">
    <svg width="30" height="30" viewBox="0 0 30 30" fill="none" xmlns="http://www.w3.org/2000/svg">
      <g transform="translate(-7.494,-4.573) scale(0.1461)">
        <!-- Outer flow path -->
        <path d="M 115 65 L 175 65 L 175 95 L 130 95 L 130 125 L 200 125 L 200 155 L 115 155 L 115 185 L 85 185 L 85 125 L 65 125 L 65 95 L 115 95 Z"
              fill="none" stroke="#fff" stroke-width="14" stroke-linejoin="round"/>
        <!-- Top-left node -->
        <rect x="122" y="72" width="18" height="18" rx="2" fill="#fff"/>
        <!-- Top arrow shaft + head -->
        <path d="M 140 81 L 165 81" stroke="#fff" stroke-width="7"/>
        <polygon points="165,77 175,81 165,85" fill="#fff"/>
        <!-- Middle zig-zag + arrow -->
        <path d="M 130 105 L 155 105 L 155 130 L 180 130 L 180 105 L 205 105"
              stroke="#fff" stroke-width="7" fill="none"/>
        <polygon points="205,101 215,105 205,109" fill="#fff"/>
        <!-- Bottom-left node -->
        <rect x="92" y="162" width="18" height="18" rx="2" fill="#fff"/>
        <!-- Diagonal arrow -->
        <path d="M 100 180 L 125 155" stroke="#fff" stroke-width="7"/>
        <polygon points="120,152 125,155 125,160" fill="#fff"/>
        <!-- Right-side node -->
        <rect x="205" y="132" width="18" height="18" rx="2" fill="#fff"/>
        <!-- Upward arrow -->
        <path d="M 215 150 L 215 125" stroke="#fff" stroke-width="7"/>
        <polygon points="211,125 215,115 219,125" fill="#fff"/>
        <!-- Bottom-right node -->
        <rect x="225" y="165" width="18" height="18" rx="2" fill="#fff"/>
      </g>
    </svg>
    GrappleMapper <span class="logo-text" style="font-size:11px;font-weight:500;color:var(--dmut);letter-spacing:0;font-family:'Inter',sans-serif">v4.8</span>
  </div>
  <input id="ftitle" value="My BJJ System" spellcheck="false">
  <div class="sp"></div>
  <div style="display:flex;align-items:center;gap:6px">
  <!-- Undo -->
  <button class="icon-btn" id="undo-btn" onclick="undo()" title="Undo (Cmd+Z / Ctrl+Z)" style="opacity:.4;cursor:default">
    <svg viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.95"/></svg>
  </button>

function parseYT(url){
  if(!url) return null;
  const m=url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?(?:.*&)?v=|shorts\/|live\/))([A-Za-z0-9_-]{11})/);
  return m?m[1]:null;
}
function parseIG(url){
  if(!url) return null;
  const m=url.match(/instagram\.com\/(?:p|reel|tv)\/([A-Za-z0-9_-]+)/);
  return m?m[1]:null;
}
function parseFB(url){
  if(!url) return null;
  // Matches: watch?v=ID, */videos/ID, fb.watch/CODE, share/r/CODE, share/v/CODE, share/CODE
  const m=url.match(/facebook\.com\/(?:watch\/?\?v=(\d+)|[^/]+\/videos\/(\d+)|share\/(?:[rv]\/)?([A-Za-z0-9_-]+))|fb\.watch\/([A-Za-z0-9_-]+)/);
  if(!m) return null;
  return m[1]||m[2]||m[3]||m[4]||null;
}

  var ns=Math.min(3,Math.max(.12,sc*d));
  px=mx-(mx-px)*(ns/sc); py=my-(my-py)*(ns/sc);
  sc=ns; applyT();
},{passive:false});

// ── MOBILE SIDEBAR TOGGLE ──
function toggleSidebar(){
  var sb=document.getElementById('sb');
  if(!sb) return;
  var MAX_H=window.innerHeight*0.65;
  var isOpen=sb.classList.contains('sb-open');
  sb.style.transition='height .3s cubic-bezier(.4,0,.2,1)';
  if(isOpen){ sb.style.height='40px'; sb.classList.remove('sb-open'); }
  else { sb.style.height=MAX_H+'px'; sb.classList.add('sb-open'); }
}
function toggleMobileSidebar(){ toggleSidebar(); }

// ── DRAG HANDLE (mobile) ──
(function(){
  var handle=document.getElementById('drag-handle');
  var sb=document.getElementById('sb');
  if(!handle||!sb) return;

  var HANDLE_H=40;
  var MAX_H=window.innerHeight*0.65;
  var dragging=false, startY=0, startH=0, currentH=HANDLE_H;

  function getSbH(){ return sb.offsetHeight||HANDLE_H; }

  function snapSidebar(open){
    MAX_H=window.innerHeight*0.65;
    sb.style.transition='height .3s cubic-bezier(.4,0,.2,1)';
    if(open){ sb.style.height=MAX_H+'px'; sb.classList.add('sb-open'); currentH=MAX_H; }
    else { sb.style.height=HANDLE_H+'px'; sb.classList.remove('sb-open'); currentH=HANDLE_H; }
  }

  // Tap handle = toggle
  handle.addEventListener('click',function(e){
    if(dragging) return;
    snapSidebar(!sb.classList.contains('sb-open'));
  });

  // Touch drag
  handle.addEventListener('touchstart',function(e){
    MAX_H=window.innerHeight*0.65;
    dragging=false;
    startY=e.touches[0].clientY;
    startH=getSbH();
    currentH=startH;
    sb.style.transition='none';
    e.preventDefault();
  },{passive:false});

  handle.addEventListener('touchmove',function(e){
    var dy=startY-e.touches[0].clientY; // up=positive
    currentH=Math.min(MAX_H, Math.max(HANDLE_H, startH+dy));
    if(Math.abs(dy)>4) dragging=true;
    sb.style.height=currentH+'px';
    e.preventDefault();
  },{passive:false});

  handle.addEventListener('touchend',function(){
    snapSidebar(currentH > HANDLE_H + (MAX_H-HANDLE_H)*0.25);
    setTimeout(function(){ dragging=false; },50);
  },{passive:false});

  // Mouse drag (desktop testing)
  handle.addEventListener('mousedown',function(e){
    MAX_H=window.innerHeight*0.65;
    dragging=false;
    startY=e.clientY; startH=getSbH(); currentH=startH;
    sb.style.transition='none';
    function onMove(e2){
      var dy=startY-e2.clientY;
      currentH=Math.min(MAX_H,Math.max(HANDLE_H,startH+dy));
      if(Math.abs(dy)>4) dragging=true;
      sb.style.height=currentH+'px';
    }
    function onUp(){
      snapSidebar(currentH > HANDLE_H+(MAX_H-HANDLE_H)*0.25);
      setTimeout(function(){ dragging=false; },50);
      window.removeEventListener('mousemove',onMove);
      window.removeEventListener('mouseup',onUp);
    }
    window.addEventListener('mousemove',onMove);
    window.addEventListener('mouseup',onUp);
    e.preventDefault();
  });

  // Tap canvas to close
  document.getElementById('wrap').addEventListener('touchstart',function(e){
    if(sb.classList.contains('sb-open')){ snapSidebar(false); e.stopPropagation(); }
  },{passive:true});
})();

// ── TOUCH EVENTS: pan, pinch-zoom, tap, double-tap, long-press ──
// Translates touch gestures into the same actions as mouse events
(function(){
  var _t1=null, _t2=null; // active touch points
  var _pinchDist0=null, _pinchSc0=null, _pinchPx0=null, _pinchPy0=null;
  var _panSt=null; // {x,y,px,py} — start of 1-finger pan
  var _tapTimer=null, _lastTap=0, _tapTarget=null;
  var _longTimer=null;
  var _moved=false;

  function touchDist(a,b){ return Math.hypot(a.clientX-b.clientX, a.clientY-b.clientY); }
  function touchMid(a,b){ return {x:(a.clientX+b.clientX)/2, y:(a.clientY+b.clientY)/2}; }

  wrap.addEventListener('touchstart',function(e){
    e.preventDefault();
    var touches=e.touches;
    _moved=false;

    if(touches.length===1){
      _t1=touches[0];
      _t2=null;
      _panSt=null;
      _pinchDist0=null;
      _tapTarget=e.target;

      // Long-press → delete (600ms)
      clearTimeout(_longTimer);
      _longTimer=setTimeout(function(){
        if(!_moved){
          var node=_tapTarget&&_tapTarget.closest&&_tapTarget.closest('.node');
          if(node&&nodes[node.id]){ snapshotForUndo(); delNode(node.id); }
        }
      },600);

    } else if(touches.length===2){
      clearTimeout(_longTimer);
      _t1=touches[0]; _t2=touches[1];
      _pinchDist0=touchDist(_t1,_t2);
      _pinchSc0=sc;
      var mid=touchMid(_t1,_t2);
      var r=wrap.getBoundingClientRect();
      _pinchPx0={mx:mid.x-r.left, my:mid.y-r.top, px:px, py:py};
      _panSt=null;
    }
  },{passive:false});

  wrap.addEventListener('touchmove',function(e){
    e.preventDefault();
    var touches=e.touches;

    if(touches.length===2 && _pinchDist0!==null){
      // Pinch-to-zoom

// Listen for YouTube player state changes
// state 0 = ended, state -1 = unstarted
window.addEventListener('message',function(e){
  try{
    var data=JSON.parse(e.data);
    // onStateChange fires with {event:'onStateChange', info:<state>}
    // infoDelivery fires with {event:'infoDelivery', info:{playerState:<state>}}
    var state=null;
    if(data.event==='onStateChange'){
      state=data.info;
    } else if(data.event==='infoDelivery'&&data.info&&typeof data.info.playerState!=='undefined'){
      state=data.info.playerState;
    }
    if(state===0){
      // Video ended — find the node whose iframe sent this message and reset it
      document.querySelectorAll('.nvframe iframe').forEach(function(iframe){
        if(iframe.contentWindow===e.source){
          var nframe=iframe.closest('.node');
          if(nframe){
            var nid=nframe.id;
            if(nodes[nid]){
              nodes[nid].playing=false;
              if(nodes[nid].prePlayW) nodes[nid].w=nodes[nid].prePlayW;
              delete _muted[nid];
              refreshNode(nid);
              setTimeout(function(){
                var el=document.getElementById(nid);
                if(el){nodes[nid].h=el.offsetHeight||120;redrawArrows();}
              },100);
            }
          }
        }
      });
    }
  }catch(ex){}
});

function fitView(){

function pathD(x1,y1,ex,ey,x2,y2,rx,ry){
  var dist=Math.hypot(x2-x1,y2-y1);
  var pull=Math.max(50,dist*0.4);
  var c1x=x1+ex*pull,c1y=y1+ey*pull;
  var c2x=x2+rx*pull,c2y=y2+ry*pull;
  return 'M'+x1+','+y1+' C'+c1x+','+c1y+' '+c2x+','+c2y+' '+x2+','+y2;
}
function posArrow(a){
  var g=document.getElementById(a.id); if(!g) return;
  var fn=nodes[a.from],tn=nodes[a.to]; if(!fn||!tn) return;
  var fel=document.getElementById(a.from), tel=document.getElementById(a.to);
  var fw=( fel ? fel.offsetWidth  : null ) || fn.w || 190;
  var fh=( fel ? fel.offsetHeight : null ) || fn.h || 120;
  var tw=( tel ? tel.offsetWidth  : null ) || tn.w || 190;
  var th=( tel ? tel.offsetHeight : null ) || tn.h || 120;
  var fcx=fn.x+fw/2,fcy=fn.y+fh/2;
  var tcx=tn.x+tw/2,tcy=tn.y+th/2;
  var dx=tcx-fcx,dy=tcy-fcy;
  var adx=Math.abs(dx),ady=Math.abs(dy);
  var fp,ep,tp,rp;
  if(ady>=adx){
    if(dy>0){fp={x:fn.x+fw/2,y:fn.y+fh};ep={x:0,y:1};tp={x:tn.x+tw/2,y:tn.y};rp={x:0,y:-1};}
    else    {fp={x:fn.x+fw/2,y:fn.y};   ep={x:0,y:-1};tp={x:tn.x+tw/2,y:tn.y+th};rp={x:0,y:1};}
  } else {
    if(dx>0){fp={x:fn.x+fw,y:fn.y+fh/2};ep={x:1,y:0};tp={x:tn.x,y:tn.y+th/2};rp={x:-1,y:0};}
    else    {fp={x:fn.x,y:fn.y+fh/2};   ep={x:-1,y:0};tp={x:tn.x+tw,y:tn.y+th/2};rp={x:1,y:0};}
  }
  // Pull path back by arrowhead depth (10 canvas units = marker path length)
  // so the tip lands on the edge and the body sits outside the node
  var AH=10;
  var tpa={x:tp.x+rp.x*AH, y:tp.y+rp.y*AH};
  var d=pathD(fp.x,fp.y,ep.x,ep.y,tpa.x,tpa.y,rp.x,rp.y);
  g.querySelectorAll('path').forEach(function(p){p.setAttribute('d',d);});
  // Label at midpoint of the visible curve (between source and target edge)
  var mx=(fp.x+tp.x)/2,my=(fp.y+tp.y)/2;
  var txt=g.querySelector('text');
  if(txt){
    txt.setAttribute('x',mx);txt.setAttribute('y',my);
    txt.textContent=a.label||'';
  }
}
function addArrow(from,to,label){

function renderNode(id){

}
function refreshNode(id){
  var old=document.getElementById(id); if(old) old.remove();
  renderNode(id);
  if(selId===id) document.getElementById(id).classList.add('sel');
  if(msel.has(id)) document.getElementById(id).classList.add('msel');
  if(armed===id) document.getElementById(id).classList.add('armed');
}
function attachEv(el,id){
  var downX=null,downY=null;

  // Video play toggle — on nvthumb click play inline, on nvstop click stop
  el.addEventListener('click',function(e){
    var thumb=e.target.closest('.nvthumb');
    var stop=e.target.closest('.nvstop');
    var open=e.target.closest('.nvopen');
    if(thumb){
      e.stopPropagation();
      var igId=parseIG(nodes[id].url);
      if(igId){
        window.open('https://www.instagram.com/p/'+igId+'/', '_blank');
      } else if(parseFB(nodes[id].url)){
        window.open(nodes[id].url, '_blank');
      } else {
        // Save pre-play dimensions
        var elNow=document.getElementById(id);
        if(elNow) nodes[id].prePlayW=nodes[id].w||190;
        nodes[id].prePlayH=nodes[id].h||120;
        nodes[id].playing=true;
        refreshNode(id);
        // After render, update h and redraw arrows
        setTimeout(function(){
          var el2=document.getElementById(id);
          if(el2){nodes[id].h=el2.offsetHeight||120;redrawArrows();}
        },100);
      }
      return;
    }
    if(stop){
      e.stopPropagation();
      nodes[id].playing=false;
      // Restore pre-play width
      if(nodes[id].prePlayW) nodes[id].w=nodes[id].prePlayW;
      refreshNode(id);
      setTimeout(function(){
        var el2=document.getElementById(id);
        if(el2){nodes[id].h=el2.offsetHeight||120;redrawArrows();}
      },100);
      return;
    }
    if(open){ e.stopPropagation(); return; }
    if(e.target.closest('.ig-clip')){e.stopPropagation();return;}
  });

  el.addEventListener('mousedown',function(e){
    if(e.target.classList.contains('delbtn')) return;
    if(e.target.closest('.nvthumb')||e.target.closest('.nvframe')||e.target.closest('.ig-clip')) return;
    e.stopPropagation();
    downX=e.clientX; downY=e.clientY;
    var c=toC(e.clientX,e.clientY);
    dragOff.x=c.x-nodes[id].x; dragOff.y=c.y-nodes[id].y;
    dragId=id; dragging=false;
  });

  el.addEventListener('mouseup',function(e){
    if(e.target.classList.contains('delbtn')) return;
    if(e.target.closest('.nvthumb')||e.target.closest('.nvframe')||e.target.closest('.ig-clip')) return;
    e.stopPropagation();
    var wasDrag=dragging;
    dragId=null; dragging=false;
    if(wasDrag) return;
    if(armed && armed!==id){
      snapshotForUndo();
      addArrow(armed,id);
      disarm();
    } else if(armed===id){
      disarm();
    } else {
      arm(id);
    }
  });

  el.addEventListener('dblclick',function(e){
    if(e.target.classList.contains('delbtn')) return;
    if(e.target.closest('.nvthumb')||e.target.closest('.nvframe')) return;
    e.stopPropagation();
    disarm();
    selNode(id);
  });

  el.addEventListener('mouseenter',function(){if(armed&&armed!==id)el.classList.add('tgt');});
  el.addEventListener('mouseleave',function(){el.classList.remove('tgt');});

  el.querySelector('.delbtn').addEventListener('click',function(e){
    e.stopPropagation();
    snapshotForUndo();
    if(msel.size>1&&msel.has(id)){deleteMsel();}
    else delNode(id);
  });
}

function delNode(id){
  var el=document.getElementById(id); if(el) el.remove();
  delete nodes[id];
  arrows=arrows.filter(function(a){
    if(a.from===id||a.to===id){var g=document.getElementById(a.id);if(g)g.remove();return false;}
    return true;
  });
  if(selId===id){selId=null;document.getElementById('detail').classList.remove('on');}
  if(armed===id) disarm();
  msel.delete(id);
  autoSave();
}
function deleteMsel(){

function openDetail(id){

async function fetchSugg(url){

        if(r2.ok) igData=await r2.json();

      if(!igData){

          if(r3.ok) igData=await r3.json();

      if(igData){

        if(selId&&igData.thumbnail_url){
          nodes[selId].thumbUrl=igData.thumbnail_url;
          refreshNode(selId); openDetail(selId);
        }
      }
    } else if(parseFB(url)){
      // Facebook oEmbed — works for public videos without auth on web
      try{
        var fbOembed=await fetch('https://www.facebook.com/plugins/video/oembed.json/?url='+encodeURIComponent(url));
        if(fbOembed.ok){
          var fbData=await fbOembed.json();
          title=fbData.title||'';
          if(selId&&fbData.thumbnail_url){
            nodes[selId].thumbUrl=fbData.thumbnail_url;
            refreshNode(selId); openDetail(selId);
          }
        }
      }catch(eFB){}
    }
  }catch(e){}

  if(!title){box.innerHTML='';return;}

  if(selId) applyName(title);

  var bjj=['guard','pass','sweep','armbar','triangle','kimura','choke','mount','side control','half guard','heel hook','submission','takedown','escape','back take','omoplata','guillotine','americana','ezekiel','torreando','leg drag','knee cut'];
  var hits=[];
  bjj.forEach(function(t){if(title.toLowerCase().includes(t)){var c=t.split(' ').map(function(w){return w[0].toUpperCase()+w.slice(1);}).join(' ');if(!hits.includes(c))hits.push(c);}});
  if(hits.length){

  } else {

}

function startNoteMode(){

function renderNote(no){
  var old=document.getElementById(no.id); if(old) old.remove();
  var isSel=(selNoteId===no.id);

  // Notes render as HTML divs on the canvas (not SVG)
  var el=document.createElement('div');
  el.id=no.id;
  el.className='note-el';
  el.style.left=no.x+'px'; el.style.top=no.y+'px';
  el.style.width=no.w+'px'; el.style.height=no.h+'px';
  if(isSel) el.style.boxShadow='0 0 0 2px #999, 1px 2px 6px rgba(0,0,0,.1)';

  // Drag bar at top
  el.innerHTML='<div class="note-drag-bar"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round"><line x1="2" y1="4" x2="10" y2="4"/><line x1="2" y1="7" x2="10" y2="7"/></svg></div>'
    +'<div class="note-body" id="nb-'+no.id+'">'+escNote(no.text)+'</div>';

  // Check overflow after DOM is ready
  requestAnimationFrame(function(){
    var body=el.querySelector('.note-body');
    if(body) body.classList.toggle('overflowing', body.scrollHeight > body.clientHeight + 2);
  });

  // If selected, add resize handles
  if(isSel){
    var HR=7, handleData=[
      {edge:'top',    style:'top:'+(-HR)+'px;left:50%;transform:translateX(-50%);cursor:ns-resize'},
      {edge:'bottom', style:'bottom:'+(-HR)+'px;left:50%;transform:translateX(-50%);cursor:ns-resize'},
      {edge:'left',   style:'left:'+(-HR)+'px;top:50%;transform:translateY(-50%);cursor:ew-resize'},
      {edge:'right',  style:'right:'+(-HR)+'px;top:50%;transform:translateY(-50%);cursor:ew-resize'},
    ];
    handleData.forEach(function(h){
      var hel=document.createElement('div');
      hel.style.cssText='position:absolute;width:'+HR*2+'px;height:'+HR*2+'px;border-radius:50%;background:#fff;border:2px solid #888;z-index:10;'+h.style;
      hel.dataset.edge=h.edge;
      hel.addEventListener('mousedown',function(e){
        e.stopPropagation(); e.preventDefault();
        snapshotForUndo();
        noteResizing={id:no.id, edge:h.edge, origX:no.x, origY:no.y, origW:no.w, origH:no.h, startCx:toC(e.clientX,e.clientY).x, startCy:toC(e.clientX,e.clientY).y};
      });
      el.appendChild(hel);
    });
    // Move handle (drag bar)
    el.querySelector('.note-drag-bar').style.cursor='move';
  }

  // Drag bar → move note
  el.querySelector('.note-drag-bar').addEventListener('mousedown',function(e){
    if(e.target.closest('[data-edge]')) return;
    e.stopPropagation(); e.preventDefault();
    selectNote(no.id);
    snapshotForUndo();
    var c=toC(e.clientX,e.clientY);
    noteDragging={id:no.id, offX:c.x-no.x, offY:c.y-no.y};
  });

  // Body click → select, dblclick → edit inline (contenteditable)
  el.querySelector('.note-body').addEventListener('click',function(e){
    e.stopPropagation(); selectNote(no.id);
  });
  el.querySelector('.note-body').addEventListener('dblclick',function(e){
    e.stopPropagation();
    selectNote(no.id);
    var body=el.querySelector('.note-body');
    body.contentEditable='true';
    body.style.cursor='text';
    body.style.outline='none';
    body.focus();
    // Place cursor at click position
    var range=document.caretRangeFromPoint?document.caretRangeFromPoint(e.clientX,e.clientY):null;
    if(range){var sel=window.getSelection();sel.removeAllRanges();sel.addRange(range);}
    body._noteId=no.id;
    body.addEventListener('blur',function onBlur(){
      body.contentEditable='false';
      body.style.cursor='default';
      var no2=notes.find(function(x){return x.id===body._noteId;});
      if(no2){ no2.text=body.innerText||''; autoSave(); }
      body.removeEventListener('blur',onBlur);
    },{once:true});
    body.addEventListener('keydown',function(e){
      if(e.key==='Escape'){ body.blur(); e.stopPropagation(); }
      else e.stopPropagation();
    });
  });

  // Right-click → delete
  el.addEventListener('contextmenu',function(e){
    e.preventDefault(); e.stopPropagation();
    if(confirm('Delete this note?')){ snapshotForUndo(); delNote(no.id); }
  });

  canvas.appendChild(el);
}

function escNote(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function addNote(x,y,w,h){

function delNote(id){

function selectNote(id){

function openNLE(noteId){

  setTimeout(function(){

    body.contentEditable='true';
    body.style.cursor='text';
    body.style.outline='none';
    body.focus();
    // Select all on new note (empty)
    var range=document.createRange(); range.selectNodeContents(body);
    var sel=window.getSelection(); sel.removeAllRanges(); sel.addRange(range);
    body._noteId=noteId;
    body.addEventListener('blur',function onBlur(){
      body.contentEditable='false';
      body.style.cursor='default';
      var no2=notes.find(function(x){return x.id===body._noteId;});
      if(no2){ no2.text=body.innerText||''; autoSave(); }
      body.removeEventListener('blur',onBlur);
    },{once:true});
    body.addEventListener('keydown',function(e){
      if(e.key==='Escape'){ body.blur(); e.stopPropagation(); }
      else e.stopPropagation();
    });
  },50);

function renderGroup(g){

  var labelW=Math.max(60, g.label.length*7.5+LABEL_PAD*2);

      +' M'+(mcx-ma*0.5)+','+(mcy-ma*0.5)+' L'+mcx+','+(mcy-ma)+' L'+(mcx+ma*0.5)+','+(mcy-ma*0.5)
      // down arrowhead
      +' M'+(mcx-ma*0.5)+','+(mcy+ma*0.5)+' L'+mcx+','+(mcy+ma)+' L'+(mcx+ma*0.5)+','+(mcy+ma*0.5)
      // left arrowhead
      +' M'+(mcx-ma*0.5)+','+(mcy-ma*0.5)+' L'+(mcx-ma)+','+mcy+' L'+(mcx-ma*0.5)+','+(mcy+ma*0.5)
      // right arrowhead
      +' M'+(mcx+ma*0.5)+','+(mcy-ma*0.5)+' L'+(mcx+ma)+','+mcy+' L'+(mcx+ma*0.5)+','+(mcy+ma*0.5);
    moveArrow.setAttribute('d',md);
    moveArrow.setAttribute('stroke','#fff');
    moveArrow.setAttribute('stroke-width',SW*0.9);
    moveArrow.setAttribute('stroke-linecap','round');
    moveArrow.setAttribute('stroke-linejoin','round');
    moveArrow.setAttribute('fill','none');
    moveArrow.style.pointerEvents='none';

    mc.addEventListener('mousedown',function(e){
      e.stopPropagation(); e.preventDefault();
      snapshotForUndo();
      var c=toC(e.clientX,e.clientY);
      grpResizing={id:g.id, edge:'move', origX:g.x, origY:g.y, startCx:c.x, startCy:c.y};
    });

    grp.appendChild(mring);
    grp.appendChild(mc);
    grp.appendChild(moveArrow);
  }

  // ── Events ──
  // Border hit: click = select group
  borderHit.addEventListener('click',function(e){
    e.stopPropagation();
    selectGroup(g.id);
  });
  borderHit.addEventListener('dblclick',function(e){
    e.stopPropagation();
    selectGroup(g.id);
    openGLE(g.id);
  });

  // Fill interior: click = deselect group (but keep group selected if already sel)
  fill.addEventListener('click',function(e){
    e.stopPropagation();
    if(selGroupId===g.id) deselectGroup();
    else { disarm(); desel(); deselectArrow(); }
  });

  // Label pill: click = select, dblclick = edit
  pill.addEventListener('click',function(e){
    e.stopPropagation();
    selectGroup(g.id);
  });
  pill.addEventListener('dblclick',function(e){
    e.stopPropagation();
    openGLE(g.id);
  });

  // Right-click border or fill = delete
  [borderHit, fill].forEach(function(el){
    el.addEventListener('contextmenu',function(e){
      e.preventDefault(); e.stopPropagation();
      if(confirm('Delete this group?')){ snapshotForUndo(); delGroup(g.id); }
    });
  });

  // Groups always behind everything
  asvg.insertBefore(grp, asvg.firstChild);
}

function delGroup(id){
  groups=groups.filter(function(g){return g.id!==id;});
  var el=document.getElementById(id); if(el) el.remove();
  if(selGroupId===id) selGroupId=null;
  autoSave();
}

function selectGroup(id){
  if(selGroupId===id) return;
  deselectGroup();
  selGroupId=id;
  disarm(); desel(); deselectArrow();
  var g=groups.find(function(x){return x.id===id;}); if(!g) return;
  renderGroup(g); // re-render with handles
}

function deselectGroup(){
  if(!selGroupId) return;
  var g=groups.find(function(x){return x.id===selGroupId;});
  selGroupId=null;
  if(g) renderGroup(g); // re-render without handles
}

function openGLE(groupId){
  var g=groups.find(function(x){return x.id===groupId;}); if(!g) return;
  var gle=document.getElementById('gle-input');
  var gleDiv=document.getElementById('group-label-editor');
  gle.value=g.label||'';
  // Size input to match pill exactly — pill starts at g.x+8, y-10, height=20
  var LABEL_H=20, PAD=8;
  var labelW=Math.max(60, g.label.length*7.5+PAD*2+20); // a bit wider for typing
  var lx=(g.x+PAD)*sc+px;
  var ly=(g.y-LABEL_H/2)*sc+py;
  gleDiv.style.left=lx+'px';
  gleDiv.style.top=ly+'px';
  gleDiv.style.display='block';
  gle.style.width=Math.max(80,labelW*sc)+'px';
  gle.style.height=(LABEL_H*sc)+'px';
  gle.style.fontSize=(11*sc)+'px';
  gleDiv._gid=groupId;
  // Hide the SVG text so input replaces it visually
  var svgEl=document.getElementById(groupId);
  if(svgEl){ var txt=svgEl.querySelector('text'); if(txt) txt.style.display='none'; }
  setTimeout(function(){gle.focus();gle.select();},20);
}

function closeGLE(save){
  var gleDiv=document.getElementById('group-label-editor');
  if(save&&gleDiv._gid){
    var g=groups.find(function(x){return x.id===gleDiv._gid;});
    if(g){
      g.label=document.getElementById('gle-input').value||'Group';
      renderGroup(g);

    var svgEl=document.getElementById(gleDiv._gid);
    if(svgEl){ var txt=svgEl.querySelector('text'); if(txt) txt.style.display=''; }
  }
  gleDiv.style.display='none';
  gleDiv._gid=null;
}

var acCursor=-1;
function acSearch(val){
  var drop=document.getElementById('ac-drop');
  acCursor=-1;
  if(!val||val.length<1){drop.style.display='none';return;}
  var q=val.toLowerCase();
  var matches=BJJ_TERMS.filter(function(t){
    var n=t.name.toLowerCase();
    return n.startsWith(q)||n.includes(' '+q)||n.includes('-'+q);
  }).slice(0,10);
  if(!matches.length){drop.style.display='none';return;}
  var meta_color=function(type){return (META[type]||META.position);};
  drop.innerHTML=matches.map(function(t,i){
    var m=meta_color(t.type);
    return '<div class="ac-item" data-name="'+esc(t.name)+'" onmousedown="acPick(\''+esc(t.name)+'\')"><span class="ac-name">'+esc(t.name)+'</span><span class="ac-tag" style="background:'+m.bg+';color:'+(m.textColor||m.color)+'">'+m.label+'</span></div>';
  }).join('');
  drop.style.display='block';
}
function acPick(name){
  document.getElementById('dp-t').value=name;
  updN('label',name);
  document.getElementById('ac-drop').style.display='none';
  acCursor=-1;
}
function acKey(e){
  var drop=document.getElementById('ac-drop');
  var items=drop.querySelectorAll('.ac-item');
  if(!items.length) return;
  if(e.key==='ArrowDown'){e.preventDefault();acCursor=Math.min(acCursor+1,items.length-1);acHighlight(items);}
  else if(e.key==='ArrowUp'){e.preventDefault();acCursor=Math.max(acCursor-1,0);acHighlight(items);}
  else if(e.key==='Enter'&&acCursor>=0){e.preventDefault();acPick(items[acCursor].dataset.name);}
  else if(e.key==='Escape'){drop.style.display='none';acCursor=-1;}
}
function acHighlight(items){
  items.forEach(function(el,i){el.classList.toggle('ac-active',i===acCursor);});
  if(acCursor>=0) items[acCursor].scrollIntoView({block:'nearest'});
}

function restoreMapState(state, skipConfirm){
  if(!state||!state.nodes) return;
  if(!skipConfirm && Object.keys(nodes).length>0){
    if(!confirm('Load this map? Current work will be replaced.')) return;
  }
  // Clear without confirm
  Object.keys(nodes).forEach(function(id){var el=document.getElementById(id);if(el)el.remove();});
  asvg.querySelectorAll('g').forEach(function(g){g.remove();});
  asvg.appendChild(pline);
  document.querySelectorAll('.note-el').forEach(function(el){el.remove();});
  nodes={};arrows=[];groups=[];notes=[];selId=null;msel.clear();deselectArrow();disarm();
  selGroupId=null; grpResizing=null; selNoteId=null; noteResizing=null; noteDragging=null;
  document.getElementById('detail').classList.remove('on');
  document.getElementById('badge').style.display='none';

  document.getElementById('ftitle').value=state.title||'My BJJ System';
  nid=state.nid||0; aid=state.aid||0; gid=state.gid||0; noid=state.noid||0;

  // Restore notes
  notes=[];
  document.querySelectorAll('.note-el').forEach(function(el){el.remove();});
  if(state.notes&&state.notes.length){
    state.notes.forEach(function(n){
      notes.push({id:n.id,x:n.x,y:n.y,w:n.w,h:n.h,text:n.text||''});
      renderNote(notes[notes.length-1]);
    });
  }

  // Restore groups
  groups=[];
  if(state.groups&&state.groups.length){
    state.groups.forEach(function(g){
      groups.push({id:g.id,x:g.x,y:g.y,w:g.w,h:g.h,label:g.label||'Group',color:g.color||GROUP_COLORS[0]});
      renderGroup(groups[groups.length-1]);
    });
  }

  state.nodes.forEach(function(nd){
    var meta=META[nd.type]||META.position;
    nodes[nd.id]={id:nd.id,x:nd.x,y:nd.y,w:nd.w||190,h:nd.h||120,
      label:nd.label,desc:nd.desc||'',url:nd.url||'',
      type:nd.type,color:meta.color,bg:meta.bg,playing:false,
      videoW:nd.videoW||null,videoH:nd.videoH||null,thumbUrl:nd.thumbUrl||null};
    renderNode(nd.id);
  });
  setTimeout(function(){
    state.nodes.forEach(function(nd){nodes[nd.id].h=document.getElementById(nd.id)?.offsetHeight||120;});
    state.arrows.forEach(function(a){addArrow(a.from,a.to,a.label||'');});
    redrawArrows(); fitView();
  },200);
}

// ── SAVE TO FILE ──
function saveMap(){
  var state=getMapState();
  var slug=state.title.replace(/[^a-z0-9]/gi,'-').replace(/-+/g,'-').toLowerCase();
  var filename=slug+'-v4.8.gmap';
  var blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url; a.download=filename; a.click();
  URL.revokeObjectURL(url);
  showToast('Saved as '+filename);
  autoSave();
}

// ── LOAD FROM FILE ──
function loadMap(input){
  var file=input.files[0]; if(!file) return;
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var state=JSON.parse(e.target.result);
      restoreMapState(state, false);
      showToast('Loaded: '+file.name);
      autoSave();
    }catch(err){
      showToast('Error reading file — is it a valid .gmap?');
    }
  };
  reader.readAsText(file);
  input.value=''; // reset so same file can be reloaded
}

var _undoStack=[], _undoMax=50, _undoPaused=false;

function snapshotForUndo(){
  if(_undoPaused) return;
  var snap={
    nodes:Object.values(nodes).map(function(n){return JSON.parse(JSON.stringify(n));}),
    arrows:JSON.parse(JSON.stringify(arrows)),
    groups:JSON.parse(JSON.stringify(groups)),
    notes:JSON.parse(JSON.stringify(notes)),
    nid:nid, aid:aid, gid:gid, noid:noid,
    title:document.getElementById('ftitle').value
  };
  _undoStack.push(snap);
  if(_undoStack.length>_undoMax) _undoStack.shift();
  var btn=document.getElementById('undo-btn');
  if(btn){btn.style.opacity='1';btn.style.cursor='pointer';}
}

function undo(){
  if(!_undoStack.length) return;
  var snap=_undoStack.pop();
  _undoPaused=true;

  // Clear canvas without confirm
  Object.keys(nodes).forEach(function(id){var el=document.getElementById(id);if(el)el.remove();});
  asvg.querySelectorAll('g').forEach(function(g){g.remove();});
  asvg.appendChild(pline);
  document.querySelectorAll('.note-el').forEach(function(el){el.remove();});
  nodes={};arrows=[];groups=[];notes=[];selId=null;msel.clear();deselectArrow();disarm();
  selGroupId=null; grpResizing=null; selNoteId=null; noteResizing=null; noteDragging=null;
  document.getElementById('detail').classList.remove('on');
  document.getElementById('badge').style.display='none';

  // Restore
  document.getElementById('ftitle').value=snap.title||'';
  nid=snap.nid||0; aid=snap.aid||0; gid=snap.gid||0; noid=snap.noid||0;

  // Restore notes
  notes=[];
  if(snap.notes&&snap.notes.length){
    snap.notes.forEach(function(n){
      notes.push({id:n.id,x:n.x,y:n.y,w:n.w,h:n.h,text:n.text||''});
      renderNote(notes[notes.length-1]);
    });
  }

  // Restore groups
  groups=[];
  asvg.querySelectorAll('[id^="g"]').forEach(function(el){ if(/^g\d+$/.test(el.id)) el.remove(); });
  if(snap.groups&&snap.groups.length){
    snap.groups.forEach(function(g){
      groups.push({id:g.id,x:g.x,y:g.y,w:g.w,h:g.h,label:g.label||'Group',color:g.color||GROUP_COLORS[0]});
      renderGroup(groups[groups.length-1]);
    });
  }
  snap.nodes.forEach(function(nd){
    var meta=META[nd.type]||META.position;
    nodes[nd.id]={...nd, color:meta.color, bg:meta.bg, playing:false};
    renderNode(nd.id);
  });
  setTimeout(function(){
    snap.nodes.forEach(function(nd){nodes[nd.id].h=document.getElementById(nd.id)?.offsetHeight||120;});
    snap.arrows.forEach(function(a){addArrow(a.from,a.to,a.label||'');});
    redrawArrows(); fitView();
    _undoPaused=false;
    autoSave();
    // Update button opacity
    var btn=document.getElementById('undo-btn');
    if(btn){btn.style.opacity=_undoStack.length?'1':'0.4';btn.style.cursor=_undoStack.length?'pointer':'default';}
  },200);
}

function exportPDF(){
  showToast('Preparing PDF…');
  // Temporarily fit the view so all nodes are visible
  fitView();
  setTimeout(function(){
    var title=document.getElementById('ftitle').value||'GrappleMapper';
    // Use browser print with a custom print stylesheet
    var printWin=window.open('','_blank','width=1200,height=900');

    // Capture the canvas element dimensions and transform
    var canvasEl=document.getElementById('canvas');
    var wrapEl=document.getElementById('wrap');
    var wrapRect=wrapEl.getBoundingClientRect();

    // Get all node positions to compute bounding box
    var ns=Object.values(nodes);
    if(!ns.length){ printWin.close(); showToast('Nothing to export'); return; }

    var minY=Math.min.apply(null,ns.map(function(n){return n.y;}))-40;
    var maxX=Math.max.apply(null,ns.map(function(n){return n.x+(n.w||190);}))+40;

function loadTmpl(name){
  clearAll();
  var T=TMPLS[name]; if(!T) return;
  document.getElementById('ftitle').value=T.title;
  nid=Math.max.apply(null,[0].concat(T.nodes.map(function(n){return parseInt(n.id.slice(1));})));
  T.nodes.forEach(function(nd){
    var meta=META[nd.type]||META.position;
    nodes[nd.id]={id:nd.id,x:nd.x,y:nd.y,label:nd.label,desc:nd.desc||'',url:nd.url||'',type:nd.type,color:meta.color,bg:meta.bg,h:120,playing:false};
    renderNode(nd.id);
  });
  setTimeout(function(){
    T.nodes.forEach(function(nd){nodes[nd.id].h=document.getElementById(nd.id).offsetHeight||120;});
    T.arrows.forEach(function(a){addArrow(a[0],a[1],a[2]||'');});
    // Render template groups if any
    if(T.groups){
      T.groups.forEach(function(g){
        gid++;
        var grp={id:'g'+gid,x:g.x,y:g.y,w:g.w,h:g.h,label:g.label,color:g.color||GROUP_COLORS[gid%GROUP_COLORS.length]};
        groups.push(grp);
        renderGroup(grp);
      });
    }
    fitView();
  },200);
}

  if(saved&&saved.nodes&&saved.nodes.length>0){
    restoreMapState(saved, true);

  applyT();

  (function(){
    var activeChip=document.querySelector('.chip[data-type="position"]');
    if(activeChip) applyChipActive(activeChip,'position');
  })();
  // Clear undo stack after init so users can't undo into blank state
  setTimeout(function(){ _undoStack=[]; 
    var btn=document.getElementById('undo-btn');
    if(btn){btn.style.opacity='0.4';btn.style.cursor='default';}
  }, 500);
})();

// ── MOBILE: Sidebar toggle ──
// ── TOUCH: pan, pinch-zoom, tap, double-tap, long-press ──
(function(){
  var _lastTap=0, _pinchDist=null;
  var _touchDragId=null, _touchDragOff={x:0,y:0}, _touchDragging=false;
  var _touchPanSt=null;
  var _longPressTimer=null;

  function tdist(t1,t2){ return Math.hypot(t1.clientX-t2.clientX,t1.clientY-t2.clientY); }

  wrap.addEventListener('touchstart',function(e){
    clearTimeout(_longPressTimer);
    var ts=e.touches;
    if(ts.length===2){
      _pinchDist=tdist(ts[0],ts[1]); e.preventDefault(); return;
    }
    if(ts.length!==1) return;
    var t=ts[0], now=Date.now();

    // Double-tap → add node
    if(now-_lastTap<320){
      _lastTap=0;
      var tgt=document.elementFromPoint(t.clientX,t.clientY);
      if(tgt&&!tgt.closest('.node')&&!tgt.closest('.note-el')){
        snapshotForUndo();
        var c=toC(t.clientX,t.clientY);
        addNode(c.x-95,c.y-55);
      }
      e.preventDefault(); return;
    }
    _lastTap=now;

    var nodeEl=document.elementFromPoint(t.clientX,t.clientY);
    var nodeDiv=nodeEl&&nodeEl.closest('.node');
    if(nodeDiv&&nodes[nodeDiv.id]){
      var id=nodeDiv.id;
      var c=toC(t.clientX,t.clientY);
      _touchDragId=id;
      _touchDragOff={x:c.x-nodes[id].x, y:c.y-nodes[id].y};
      _touchDragging=false;
      // Long-press → open detail
      _longPressTimer=setTimeout(function(){
        _touchDragId=null;
        selNode(id);
        var sb=document.getElementById('sb');
        if(sb&&sb.classList.contains('sb-open')) toggleSidebar();
      },500);
      e.preventDefault(); return;
    }
    // Canvas pan
    _touchPanSt={x:t.clientX,y:t.clientY,px:px,py:py};
    e.preventDefault();
  },{passive:false});

  wrap.addEventListener('touchmove',function(e){
    clearTimeout(_longPressTimer);
    var ts=e.touches;
    if(ts.length===2&&_pinchDist!==null){
      var d=tdist(ts[0],ts[1]);
      var mx=(ts[0].clientX+ts[1].clientX)/2, my=(ts[0].clientY+ts[1].clientY)/2;
      var r=wrap.getBoundingClientRect();
      var ns=Math.min(3,Math.max(.12,sc*(d/_pinchDist)));
      px=(mx-r.left)-((mx-r.left)-px)*(ns/sc);
      py=(my-r.top)-((my-r.top)-py)*(ns/sc);
      sc=ns; applyT(); _pinchDist=d; e.preventDefault(); return;
    }
    if(ts.length!==1) return;
    var t=ts[0]; e.preventDefault();
    if(_touchDragId){
      var c=toC(t.clientX,t.clientY);
      var nx=c.x-_touchDragOff.x, ny=c.y-_touchDragOff.y;
      if(!_touchDragging&&Math.hypot(nx-nodes[_touchDragId].x,ny-nodes[_touchDragId].y)>6) _touchDragging=true;
      if(_touchDragging&&nodes[_touchDragId]){
        nodes[_touchDragId].x=nx; nodes[_touchDragId].y=ny;
        var el=document.getElementById(_touchDragId);
        if(el){el.style.left=nx+'px';el.style.top=ny+'px';}
        redrawArrows();
      }
      return;
    }
    if(_touchPanSt){
      px=_touchPanSt.px+(t.clientX-_touchPanSt.x);
      py=_touchPanSt.py+(t.clientY-_touchPanSt.y);
      applyT();
    }
  },{passive:false});

  wrap.addEventListener('touchend',function(e){
    clearTimeout(_longPressTimer);
    _pinchDist=null;
    if(_touchDragId){
      if(!_touchDragging){
        var id=_touchDragId;
        if(armed&&armed!==id){ snapshotForUndo(); addArrow(armed,id); disarm(); }
        else if(armed===id){ disarm(); }
        else { arm(id); }
      } else { autoSave(); }
      _touchDragId=null; _touchDragging=false;
    }
    _touchPanSt=null;
  },{passive:false});
})();
